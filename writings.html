<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writings - JCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #000000;
        }
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        /* Consistent reveal animations */
        .animate-reveal {
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.3s; }
        .stagger-3 { animation-delay: 0.5s; }
        .stagger-4 { animation-delay: 0.7s; }

        /* Mobile Menu Transitions */
        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }
        .menu-overlay {
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Card Hover Depth */
        .writing-card {
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .writing-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px -20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-gray-300 antialiased selection:bg-white/20">

    <header class="fixed top-0 left-0 w-full z-[60] mix-blend-difference">
        <div class="container mx-auto px-6 py-8 flex justify-between items-center">
            <a href="index.html" class="group">
                <h1 class="text-2xl font-bold text-white tracking-tighter">Justin C Hedge</h1>
            </a>
            <button id="menu-toggle" class="text-white p-2 focus:outline-none" aria-label="Toggle Menu">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg>
            </button>
        </div>
    </header>

    <div id="overlay" class="menu-overlay fixed inset-0 bg-black/80 backdrop-blur-sm z-[70]"></div>
    <nav id="mobile-menu" class="fixed top-0 right-0 h-full w-full max-w-sm bg-[#0a0a0a] z-[80] border-l border-white/5 flex flex-col p-12">
        <button id="menu-close" class="absolute top-8 right-8 text-white">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="mt-20 space-y-8">
            <a href="index.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Home</a>
            <a href="writings.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors underline decoration-white/20 underline-offset-8">Writings</a>
            <a href="bookclub.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Book Club</a>
            <a href="jazzclub.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Jazz Club</a>
        </div>
    </nav>

    <main class="pt-32 pb-24">
        <!-- Page Header -->
        <section class="container mx-auto px-6 mb-20 text-center">
            <h2 class="text-5xl md:text-7xl font-bold text-white mb-4 animate-reveal">Writings</h2>
            <div class="w-12 h-px bg-white/20 mx-auto animate-reveal stagger-1"></div>
        </section>

        <section class="container mx-auto px-6">
            <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 md:gap-8">
                
                <!-- Article Card 1 -->
                <div class="writing-card bg-[#050505] rounded-3xl overflow-hidden border border-white/5 animate-reveal stagger-1">
                    <a href="thesuitcase.html" class="group block h-full flex flex-col">
                        <div class="aspect-video overflow-hidden">
                            <img src="articleimage1.jpg" 
                                 alt="Apartment building" 
                                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-60">
                        </div>
                        <div class="p-8 flex-grow flex flex-col">
                            <p class="text-xs font-bold tracking-[0.3em] uppercase text-white/40 mb-4">Short Story</p>
                            <h3 class="text-2xl font-bold text-white mb-4 leading-tight group-hover:text-gray-300 transition-colors">The Suitcase</h3>
                            <p class="text-gray-500 mb-8 leading-relaxed line-clamp-3">A mother and her child.</p>
                            <div class="mt-auto flex items-center gap-2 text-white font-bold text-sm tracking-wider uppercase">
                                Read Story
                                <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                            </div>
                        </div>
                    </a>
                </div>

                

            </div>
        </section>
    </main>

    <footer class="py-12 border-t border-white/5 bg-black">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-sm text-gray-600 font-medium tracking-tight">Justin C Hedge &mdash; 2026</p>
            <p class="text-xs text-gray-700 uppercase tracking-[0.2em]">The content's not down here, silly.</p>
        </div>
    </footer>

    <script>
        // Menu functionality
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const mobileMenu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            mobileMenu.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.classList.toggle('overflow-hidden');
        }

        menuToggle.addEventListener('click', toggleMenu);
        menuClose.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', toggleMenu);
        });

        // Animation Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
