<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Suitcase - Justin C Hedge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #000000;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
        .animate-reveal {
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.3s; }

        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }
        .menu-overlay {
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Viewer height for desktop */
        .pdf-container {
            height: 85vh;
            background: #0a0a0a;
        }
    </style>
</head>
<body class="bg-black text-gray-300 antialiased selection:bg-white/20">

    <header class="fixed top-0 left-0 w-full z-[60] mix-blend-difference">
        <div class="container mx-auto px-6 py-8 flex justify-between items-center">
            <a href="index.html" class="group">
                <h1 class="text-2xl font-bold text-white tracking-tighter">Justin C Hedge</h1>
            </a>
            <button id="menu-toggle" class="text-white p-2 focus:outline-none" aria-label="Toggle Menu">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8h16M4 16h16"></path></svg>
            </button>
        </div>
    </header>

    <div id="overlay" class="menu-overlay fixed inset-0 bg-black/80 backdrop-blur-sm z-[70]"></div>
    <nav id="mobile-menu" class="fixed top-0 right-0 h-full w-full max-w-sm bg-[#0a0a0a] z-[80] border-l border-white/5 flex flex-col p-12">
        <button id="menu-close" class="absolute top-8 right-8 text-white">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="mt-20 space-y-8">
            <a href="index.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Home</a>
            <a href="writings.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors underline decoration-white/20 underline-offset-8">Writings</a>
            <a href="bookclub.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Book Club</a>
            <a href="jazzclub.html" class="block text-4xl font-bold text-white hover:text-gray-400 transition-colors">Jazz Club</a>
        </div>
    </nav>

    <main class="pt-32 pb-24">
        <section class="container mx-auto px-6 mb-12">
            <div class="max-w-5xl mx-auto text-center md:text-left">
                <span class="inline-block text-xs font-bold tracking-[0.3em] uppercase text-white/40 mb-4 animate-reveal">Short Story</span>
                <h2 class="text-5xl md:text-7xl font-bold text-white mb-2 animate-reveal stagger-1">The Suitcase</h2>
                <div class="w-12 h-px bg-white/20 mb-8 animate-reveal stagger-2"></div>
            </div>
        </section>

        <section class="container mx-auto px-6">
            <div class="max-w-5xl mx-auto">
                
                <!-- Desktop/Tablet Viewer -->
                <div class="hidden md:block pdf-container w-full rounded-2xl overflow-hidden border border-white/10 shadow-2xl animate-reveal stagger-2">
                    <embed 
                        src="thesuitcase.pdf" 
                        type="application/pdf" 
                        width="100%" 
                        height="100%" 
                        class="rounded-2xl"
                    />
                </div>

                <!-- Mobile Fallback -->
                <div class="md:hidden animate-reveal stagger-2">
                    <div class="bg-[#050505] border border-white/5 p-12 rounded-3xl text-center">
                        <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5S19.832 5.477 21 6.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-4">Read on your device</h3>
                        <p class="text-gray-500 mb-8 leading-relaxed">For the best experience on mobile, we recommend opening the PDF in fullscreen.</p>
                        <a href="thesuitcase.pdf" target="_blank" class="inline-flex items-center gap-3 bg-white text-black px-8 py-4 rounded-full font-bold text-lg hover:bg-gray-200 transition-all">
                            Open Fullscreen
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                </div>

                <!-- Story Metadata -->
                <div class="mt-12 flex flex-col md:flex-row justify-between items-center gap-6 animate-reveal" style="animation-delay: 0.8s;">
                    <a href="writings.html" class="text-sm font-bold uppercase tracking-widest text-gray-500 hover:text-white transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"></path></svg>
                        Back to Writings
                    </a>
                    <p class="text-xs text-gray-700 uppercase tracking-widest">Published 2026</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="py-12 border-t border-white/5 bg-black">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-sm text-gray-600 font-medium tracking-tight">Justin C Hedge &mdash; 2026</p>
            <p class="text-xs text-gray-700 uppercase tracking-[0.2em]">Think Free, Read Free.</p>
        </div>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const mobileMenu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            mobileMenu.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.classList.toggle('overflow-hidden');
        }

        menuToggle.addEventListener('click', toggleMenu);
        menuClose.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', toggleMenu);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-reveal').forEach(el => {
            el.style.animationPlayState = 'paused';
            observer.observe(el);
        });
    </script>
</body>
</html>
